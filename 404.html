<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Impress Digital Designs</title>
<meta name="robots" content="noindex, follow">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0d0c;
    color: #e8f5f2;
    font-family: 'Cabinet Grotesk', sans-serif;
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-size: 6rem;
    margin: 0;
    background: linear-gradient(90deg, #2fe0b3, #22b8c9);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p {
    font-size: 1.2rem;
    color: #9fb8b3;
    margin: 0.5rem 0 2rem;
  }
  a {
    color: #0a0d0c;
    background: #2fe0b3;
    padding: 0.75rem 1.75rem;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    transition: background 0.2s ease;
  }
  a:hover {
    background: #22b8c9;
  }
</style>
</head>
<body>
  <h1>404</h1>
  <p>This page doesn't exist — but a working solution is one click away.</p>
  <a href="./">Back to Home</a>
</body>
</html>
